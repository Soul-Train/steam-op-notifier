name: Steam OP Daily Check

on:
  schedule:
    - cron: "0 13 * * *"   # daily at 13:00 UTC (9 AM Eastern)
  workflow_dispatch: {}     # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run notifier
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python steam_op_notifier.py

      - name: Commit updated state
        run: |
          git config user.name "op-notifier-bot"
          git config user.email "actions@github.com"
          git add seen.json op_games.md
          git diff --cached --quiet || git commit -m "Update seen list"
          git push
